<!DOCTYPE html>
<html>
<head>
    <title>Advanced CSS Teaching Simulator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#eef2f3; font-family: Arial; }

        .header {
            background:#212529;
            color:white;
            padding:15px;
            text-align:center;
        }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
            animation: fade 0.8s;
        }

        @keyframes fade {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }

        .demo {
            padding:15px;
            border:1px solid #ccc;
            margin-top:10px;
        }

        .child {
            padding:10px;
            margin-top:10px;
        }

        .controls button { margin:5px; }

    </style>
</head>

<body>

<div class="header">
    <h2>🎨 Advanced CSS Teaching Simulator</h2>
</div>

<div class="container">

    <h5 class="text-center mt-3" id="progress"></h5>

    <div class="box" id="content"></div>

    <div class="text-center controls">
        <button class="btn btn-secondary" onclick="prev()">Prev</button>
        <button class="btn btn-primary" onclick="next()">Next</button>
        <button class="btn btn-success" onclick="play()">Auto Play</button>
        <button class="btn btn-danger" onclick="pause()">Pause</button>
    </div>

</div>

<script>

const slides = [

`🎨 <b>Introduction to CSS</b><br>
CSS styles HTML elements.<br>
Example:<br>
<p style="color:red;">Red Text</p>`,

`✨ <b>CSS Features</b><br>
✔ Separation of content & design<br>
✔ Reusability<br>
✔ Faster UI<br>
✔ Responsive layouts`,

`📘 <b>CSS Syntax</b><br>
Selector { property: value; }<br><br>
Example:<br>
p { color: blue; }`,

`🔗 <b>CSS with HTML</b><br>
<b>Inline:</b> style=""<br>
<b>Internal:</b> &lt;style&gt;<br>
<b>External:</b> .css file`,

`⚖️ <b>Cascading Simulation</b><br>

<button onclick="cascade1()">External</button>
<button onclick="cascade2()">Internal</button>
<button onclick="cascade3()">Inline</button>

<p id="cascadeText">Watch my color change</p>

<p>Priority: Inline > Internal > External</p>`,

`🧬 <b>Inheritance Demo</b><br>

<div id="parent" style="color:blue;">
Parent Text
    <div id="child" class="child">
        Child inherits color
    </div>
</div>

<button onclick="changeParent()">Change Parent Color</button>`,

`🧪 <b>Text Properties Lab</b><br>

<div id="textDemo" class="demo">Sample Text</div>

<button onclick="color()">Color</button>
<button onclick="size()">Size</button>
<button onclick="align()">Align</button>
<button onclick="spacing()">Spacing</button>
<button onclick="weight()">Bold</button>`,

`📊 <b>Summary</b><br>
✔ CSS controls styling<br>
✔ Syntax = selector + property<br>
✔ Cascading defines priority<br>
✔ Inheritance passes styles<br>
✔ Text properties enhance UI`
];

let i = 0;
let interval;

// DISPLAY
function show() {
    document.getElementById("content").innerHTML = slides[i];
    document.getElementById("progress").innerText =
        "Topic " + (i+1) + " / " + slides.length;
}

// NAVIGATION
function next() { if(i < slides.length-1) i++; show(); }
function prev() { if(i > 0) i--; show(); }

// AUTO PLAY
function play() {
    interval = setInterval(() => {
        if(i < slides.length-1) { i++; show(); }
        else clearInterval(interval);
    }, 4000);
}
function pause() { clearInterval(interval); }

// CASCADING DEMO
function cascade1() {
    document.getElementById("cascadeText").style.color = "green";
}
function cascade2() {
    document.getElementById("cascadeText").style.color = "orange";
}
function cascade3() {
    document.getElementById("cascadeText").style.color = "red";
}

// INHERITANCE
function changeParent() {
    document.getElementById("parent").style.color = "purple";
}

// TEXT PROPERTIES
function color() { document.getElementById("textDemo").style.color="red"; }
function size() { document.getElementById("textDemo").style.fontSize="28px"; }
function align() { document.getElementById("textDemo").style.textAlign="center"; }
function spacing() { document.getElementById("textDemo").style.letterSpacing="5px"; }
function weight() { document.getElementById("textDemo").style.fontWeight="bold"; }

// INIT
show();

</script>

</body>
</html>
